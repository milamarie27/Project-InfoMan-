<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Clearance System</title>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<!-- ═══ LOGIN PAGE ═══════════════════════════════════════════════════════════ -->
<div id="page-login" class="page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🎓</div>
        <h1>Online Clearance</h1>
        <p>Student Clearance Management System</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="Enter username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter password" required autocomplete="current-password"/>
        </div>
        <div id="login-error" class="alert alert-danger hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      </form>
      <p class="login-hint">Don't have an account? <a href="#" onclick="showPage('page-register')">Register as Student</a></p>
    </div>
  </div>
</div>

<!-- ═══ REGISTER PAGE ════════════════════════════════════════════════════════ -->
<div id="page-register" class="page hidden">
  <div class="login-wrap">
    <div class="login-card wide">
      <div class="login-logo">
        <div class="logo-icon">🎓</div>
        <h1>Student Registration</h1>
      </div>
      <form id="register-form">
        <div class="form-row">
          <div class="form-group"><label>First Name*</label><input type="text" id="reg-fname" required/></div>
          <div class="form-group"><label>Last Name*</label><input type="text" id="reg-lname" required/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Middle Initial</label><input type="text" id="reg-mi" maxlength="3"/></div>
          <div class="form-group"><label>Suffix</label><input type="text" id="reg-suffix" placeholder="Jr., III..."/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Student Number*</label><input type="text" id="reg-snum" required placeholder="e.g. 2024-0001"/></div>
          <div class="form-group">
            <label>Curriculum / Section*</label>
            <select id="reg-curriculum" required><option value="">Loading...</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Enrollment Status</label>
            <select id="reg-status">
              <option value="Regular">Regular</option>
              <option value="Irregular">Irregular</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Username*</label><input type="text" id="reg-uname" required/></div>
          <div class="form-group"><label>Password*</label><input type="password" id="reg-pwd" required minlength="6"/></div>
        </div>
        <div id="reg-error" class="alert alert-danger hidden"></div>
        <div id="reg-success" class="alert alert-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        <p style="text-align:center;margin-top:12px"><a href="#" onclick="showPage('page-login')">← Back to Login</a></p>
      </form>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ══════════════════════════════════════════════════════════════ -->
<div id="page-app" class="page hidden">
  <nav class="navbar">
    <div class="nav-brand">🎓 <span>Online Clearance</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div class="nav-user">
      <span id="nav-username"></span>
      <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="main-content">
      <div class="loading-spinner" id="content-loader">Loading...</div>
    </main>
  </div>
</div>

<!-- ═══ MODAL ════════════════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
